name: test-mount-client
type: charm
title: Test mount client
summary: Operator to test the mount relation from `filesystem-client`
description: Test mount client

platforms:
  ubuntu@26.04:amd64:

parts:
  charm:
    plugin: uv
    source: .
    build-snaps:
      - astral-uv
    override-build: |
      # Regenerate lockfile to use vendored subpackages from `filesystem-charms`.
      uv lock
      craftctl default
    build-environment:
      - UV_FROZEN: "false"  # Allow lockfile to be updated in `override-build`.

provides:
  mount:
    interface: mount_info

config:
  options:
    mountpoint:
      description: Mount point of the filesystem.
      type: string
