name: nfs-server-proxy
type: charm
title: NFS Server Proxy
summary: Charmed NFS server for non-charmed NFS storage appliances.
description: |
  Charmed NFS server for non-charmed NFS storage appliances.

  Enable NFS Client charms to mount non-charmed NFS shares.
links:
  source:
  - https://github.com/canonical/filesystem-charms
  issues:
  - https://github.com/canonical/filesystem-charms/issues

platforms:
  ubuntu@26.04:amd64:

parts:
  charm:
    plugin: uv
    source: .
    build-snaps:
      - astral-uv
    override-build: |
      # Regenerate lockfile to use vendored subpackages from `filesystem-charms`.
      uv lock
      craftctl default
    build-environment:
      - UV_FROZEN: "false"  # Allow lockfile to be updated in `override-build`.

peers:
  server-peers:
    interface: server_peers

provides:
  filesystem:
    interface: filesystem_info

config:
  options:
    hostname:
      description: Hostname of the NFS server.
      type: string
    port:
      description: Port to access the NFS server.
      type: int
    path:
      description: Exported path of the NFS share.
      type: string
