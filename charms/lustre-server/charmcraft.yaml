name: lustre-server
type: charm
title: Lustre Parallel File System
summary: Provides the Lustre parallel file system.
description: |
  This charm enables the deployment and management of the Lustre parallel file system.

  This single charm provides all Lustre server components: MGS (Management Server), MDS (Metadata
  Server), and OSS (Object Storage Server) and intelligently provisions each. Storage targets are
  automatically set up as ZFS-backed pools and datasets. LNet is initialized, providing the network
  layer.

  It meets the need for a standard, reproducible deployment of Lustre within a Juju environment.

  It is useful for HPC and data-intensive teams looking for a high-throughput, scalable, distributed
  file system.

platforms:
  ubuntu@26.04:amd64:

parts:
  charm:
    plugin: uv
    source: .
    build-snaps:
      - astral-uv
    override-build: |
      # Regenerate lockfile to use vendored subpackages from `filesystem-charms`.
      uv lock
      craftctl default
    build-environment:
      - UV_FROZEN: "false"  # Allow lockfile to be updated in `override-build`.

peers:
  lustre-peer:
    interface: lustre-peer
  filesystem-peer:
    interface: filesystem-peer

provides:
  filesystem:
    interface: filesystem_info
